<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>母亲节快乐 · 星空中的祝福</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}
body {
  overflow: hidden;
  background: radial-gradient(circle at top, #4b1c5e 0%, #12032a 40%, #050012 100%);
  color: #fff;
}

#threeCanvas {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
  filter: saturate(1.1) contrast(1.05);
}

.petal-wrap {
  position: fixed;
  width: 100%;
  height: 100%;
  z-index: 2;
  pointer-events: none;
}
.petal {
  position: absolute;
  width: 16px;
  height: 18px;
  background: radial-gradient(circle at 30% 30%, #ffe9f3 0%, #ff9ac7 50%, #ff5b9e 100%);
  border-radius: 50% 50% 45% 55%;
  opacity: 0.92;
  box-shadow: 0 8px 25px rgba(255, 115, 170, 0.18);
  transform: rotate(15deg);
  animation: fall linear infinite;
  mix-blend-mode: screen;
}
.petal::before {
  content: '';
  position: absolute;
  inset: 20% 15% 15% 15%;
  background: radial-gradient(circle at 50% 30%, rgba(255,255,255,0.95), rgba(255,255,255,0) 65%);
  border-radius: 50%;
}
@keyframes fall {
  0% {
    opacity: 0;
    transform: translateY(-20px) translateX(0px) rotate(0deg);
  }
  10% {
    opacity: 0.85;
  }
  100% {
    transform: translateY(110vh) translateX(var(--dx, 0px)) rotate(360deg);
    opacity: 0;
  }
}

#heartCanvas {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  pointer-events: none;
  z-index: 5;
}

/* 提示文字 */
.tip {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: rgba(255,255,255,0.95);
  font-size: 18px;
  text-align: center;
  pointer-events: none;
  z-index: 3;
  padding: 14px 18px;
  background: rgba(10, 0, 26, 0.55);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 14px;
  box-shadow: 0 0 40px rgba(255, 150, 210, 0.12);
  transition: opacity 1s, transform 0.3s;
}
.tip.hidden {
  opacity: 0;
}
.tip .hint {
  display: block;
  margin-top: 8px;
  color: rgba(255,255,255,0.75);
  font-size: 14px;
}
.reader-overlay {
  position: fixed;
  inset: 0;
  background: rgba(5, 0, 15, 0.92);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 32px;
  z-index: 10;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
}
.reader-overlay.visible {
  opacity: 1;
  pointer-events: auto;
}
.reader-card {
  position: relative;
  width: min(840px, 100%);
  max-height: calc(100vh - 80px);
  overflow-y: auto;
  background: rgba(255,255,255,0.98);
  border-radius: 26px;
  padding: 36px 44px;
  box-shadow: 0 20px 80px rgba(0,0,0,0.24);
}
.reader-card h1 {
  font-size: 2.4rem;
  color: #2a2a2a;
  margin-bottom: 24px;
}
.reader-card p {
  font-size: 1.1rem;
  line-height: 1.8;
  color: #333;
  margin-bottom: 18px;
}
.reader-close {
  position: absolute;
  top: 18px;
  right: 18px;
  width: 44px;
  height: 44px;
  border: none;
  background: rgba(255,255,255,0.95);
  border-radius: 50%;
  font-size: 1.2rem;
  cursor: pointer;
  box-shadow: 0 8px 24px rgba(0,0,0,0.15);
}
</style>
</head>

<body>

<canvas id="threeCanvas"></canvas>
<div class="petal-wrap"></div>
<canvas id="heartCanvas"></canvas>
<div class="tip"><span class="tip-main">向左拖动，寻找星空中的隐藏祝福 ✨</span><span class="hint">当提示变成“找到隐藏祝福”时，就靠近它。</span></div>
<div class="reader-overlay" id="readerOverlay">
  <div class="reader-card">
    <button class="reader-close" id="readerClose" aria-label="关闭阅读模式">×</button>
    <h1>母亲节快乐</h1>
    <p>爱人如养花，最好的花匠是妈妈</p>
    <p>妈妈，希望您永远不要被“母亲”这个标签所困。</p>
    <p>你就应该开心地做自己，尽情享受作为一个女性的爱与美。</p>
    <p>想去看世界便去看世界，想体验什么便大胆去体验。</p>
    <p>不必被目标限制住自己的人生轨迹。</p>
    <p>您的礼物正在路上，记得查收，最后，希望您永远健康、平安、快乐！</p>
  </div>
</div>

<script type="module">
import * as THREE from "https://cdn.skypack.dev/three@0.136.0";
import { OrbitControls } from "https://cdn.skypack.dev/three@0.136.0/examples/jsm/controls/OrbitControls";

// 场景
let scene = new THREE.Scene();
scene.background = new THREE.Color(0x100020);

let camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 1, 1000);
camera.position.set(0, 4, 22);

const canvas = document.getElementById("threeCanvas");
let renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setSize(innerWidth, innerHeight);

function updateCardDepth() {
  cardDepth = window.innerWidth <= 480 ? -20 : window.innerWidth <= 768 ? -22 : -30;
  cardGroup.position.set(0, 0, cardDepth);
  if (marker) {
    marker.position.set(0, 0, cardDepth + 2);
  }
}

window.addEventListener("resize", () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  updateCardDepth();
});

// 手势控制（拖拽旋转视角）
let controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.enablePan = false;
controls.rotateSpeed = 0.5;
controls.minDistance = 12;
controls.maxDistance = 45;
controls.autoRotate = false;

// ==========================
// 隐藏的文字面板（初始不在视野 + 完全透明）
// ==========================
const cardGroup = new THREE.Group();
let cardDepth = window.innerWidth <= 480 ? -20 : window.innerWidth <= 768 ? -22 : -30;
cardGroup.position.set(0, 0, cardDepth);
scene.add(cardGroup);

// 祝福文字画布（无白底）
const textCanvas = document.createElement('canvas');
const ctxText = textCanvas.getContext('2d');
textCanvas.width = 1024;
textCanvas.height = 768;

// 绘制文字
ctxText.fillStyle = '#ffd1e8';
ctxText.font = '60px Arial';
ctxText.textAlign = 'center';
ctxText.fillText('母亲节快乐', 512, 120);

ctxText.font = '40px Arial';
ctxText.fillStyle = '#ffc0dd';
ctxText.fillText('妈妈，希望您永远不要被“母亲”这个标签所困', 512, 220);
ctxText.fillText('你就应该开心地做自己', 512, 280);
ctxText.fillText('尽情享受作为一个女性的爱与美', 512, 340);
ctxText.fillText('想去看世界便去看世界', 512, 400);
ctxText.fillText('想体验什么便大胆去体验', 512, 460);
ctxText.fillText('不必被目标限制住自己的人生轨迹', 512, 520);
ctxText.fillText('最后，希望您健康、平安、快乐！', 512, 580);

const textTexture = new THREE.CanvasTexture(textCanvas);
const textMaterial = new THREE.MeshBasicMaterial({
  map: textTexture,
  transparent: true,
  opacity: 0,
  depthWrite: false
});

const planeGeometry = new THREE.PlaneGeometry(14, 10);
const textPlane = new THREE.Mesh(planeGeometry, textMaterial);
cardGroup.add(textPlane);

// ==========================
// 星空粒子
// ==========================
let gu = { time: { value: 0 } };
let sizes = [];
let shift = [];

function pushShift() {
  shift.push(
    Math.random() * Math.PI,
    Math.random() * Math.PI * 2,
    (Math.random() * 0.9 + 0.1) * Math.PI * 0.1,
    Math.random() * 0.9 + 0.1
  );
}

let pts = new Array(50000).fill().map(() => {
  sizes.push(Math.random() * 1.5 + 0.5);
  pushShift();
  return new THREE.Vector3().randomDirection().multiplyScalar(Math.random() * 0.5 + 9.5);
});

for (let i = 0; i < 100000; i++) {
  let r = 10, R = 40;
  let rand = Math.pow(Math.random(), 1.5);
  let radius = Math.sqrt(R * R * rand + (1 - rand) * r * r);
  pts.push(new THREE.Vector3().setFromCylindricalCoords(radius, Math.random() * 2 * Math.PI, (Math.random() - 0.5) * 2));
  sizes.push(Math.random() * 1.5 + 0.5);
  pushShift();
}

let g = new THREE.BufferGeometry().setFromPoints(pts);
g.setAttribute("sizes", new THREE.Float32BufferAttribute(sizes, 1));
g.setAttribute("shift", new THREE.Float32BufferAttribute(shift, 4));

let m = new THREE.PointsMaterial({
  size: 0.125,
  transparent: true,
  depthTest: false,
  blending: THREE.AdditiveBlending,
  onBeforeCompile: shader => {
    shader.uniforms.time = gu.time;
    shader.vertexShader = `
      uniform float time;
      attribute float sizes;
      attribute vec4 shift;
      varying vec3 vColor;
      ${shader.vertexShader}
    `.replace(`gl_PointSize = size;`, `gl_PointSize = size * sizes;`)
    .replace(`#include <color_vertex>`, `#include <color_vertex>
      float d = length(abs(position)/vec3(40.,10.,40));
      d=clamp(d,0.,1.);
      vColor = mix(vec3(227.,155.,0.),vec3(100.,50.,255.),d)/255.;`)
    .replace(`#include <begin_vertex>`, `#include <begin_vertex>
      float t = time;
      float moveT = mod(shift.x + shift.z * t,PI2);
      float moveS = mod(shift.y + shift.z * t,PI2);
      transformed += vec3(cos(moveS) * sin(moveT),cos(moveT),sin(moveS)*sin(moveT)) * shift.w;`);
    shader.fragmentShader = `
      varying vec3 vColor;
      ${shader.fragmentShader}
    `.replace(`#include <clipping_planes_fragment>`, `#include <clipping_planes_fragment>
      float d = length(gl_PointCoord.xy - 0.5);`)
    .replace(`vec4 diffuseColor = vec4( diffuse, opacity );`, `vec4 diffuseColor = vec4( vColor, smoothstep(0.5, 0.1, d) );`);
  }
});

let stars = new THREE.Points(g, m);
stars.rotation.order = "ZYX";
stars.rotation.z = 0.2;
scene.add(stars);

let clock = new THREE.Clock();
let tip = document.querySelector('.tip');
let tipMain = tip.querySelector('.tip-main');
let tipHint = tip.querySelector('.hint');
let readerOverlay = document.getElementById('readerOverlay');
let readerClose = document.getElementById('readerClose');
let audioCtx = null;
let masterGain = null;
let bgmPulse = null;
let isFound = false;
let readerOpen = false;

function showReader() {
  readerOverlay.classList.add('visible');
  tip.classList.add('hidden');
  readerOpen = true;
}

function hideReader() {
  readerOverlay.classList.remove('visible');
  readerOpen = false;
  if (isFound) {
    tip.classList.remove('hidden');
  }
}

readerClose.addEventListener('click', hideReader);
readerOverlay.addEventListener('click', e => {
  if (e.target === readerOverlay) hideReader();
});

function initBgm() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.001;
  masterGain.connect(audioCtx.destination);

  const createPad = (freq, detune, volume) => {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'triangle';
    osc.frequency.value = freq;
    osc.detune.value = detune;
    gain.gain.value = volume;
    osc.connect(gain);
    gain.connect(masterGain);
    osc.start();
  };

  createPad(220, 0, 0.02);
  createPad(277.18, 10, 0.018);
  createPad(329.63, -8, 0.016);

  const playBell = (freq, start) => {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    const filter = audioCtx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = 1200;
    osc.type = 'sine';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0.0001, start);
    gain.gain.exponentialRampToValueAtTime(0.08, start + 0.4);
    gain.gain.exponentialRampToValueAtTime(0.0001, start + 3.5);
    osc.connect(filter);
    filter.connect(gain);
    gain.connect(masterGain);
    osc.start(start);
    osc.stop(start + 4);
  };

  const scheduleBellLoop = () => {
    const now = audioCtx.currentTime;
    playBell(392.00, now + 0.2);
    playBell(523.25, now + 1.6);
    playBell(440.00, now + 3.0);
    playBell(349.23, now + 4.6);
    playBell(392.00, now + 6.2);
  };

  scheduleBellLoop();
  bgmPulse = setInterval(scheduleBellLoop, 6200);
  setTimeout(() => {
    masterGain.gain.linearRampToValueAtTime(0.06, audioCtx.currentTime + 5);
  }, 20);
}

window.addEventListener('pointerdown', () => {
  if (!audioCtx) initBgm();
}, { once: true });

function tryOpenReader() {
  if (isFound && !readerOpen) {
    showReader();
  }
}
renderer.domElement.addEventListener('click', tryOpenReader);
renderer.domElement.addEventListener('touchend', tryOpenReader, { passive: true });

// 标记隐藏文字位置的辅助环
const marker = new THREE.Mesh(
  new THREE.RingGeometry(1.4, 1.9, 64),
  new THREE.MeshBasicMaterial({ color: 0xff99cc, transparent: true, opacity: 0.55, side: THREE.DoubleSide })
);
marker.position.set(0, 0, cardDepth + 2);
marker.renderOrder = 1;
scene.add(marker);

function updateTip(angle) {
  if (!isFound) {
    if (angle < -1.0) {
      tipMain.textContent = '就在前方，继续向左靠近...';
      tipHint.textContent = '现在你已经接近隐藏文字的位置。';
    } else if (angle < -0.3) {
      tipMain.textContent = '向左转一点，就能看到隐藏的祝福';
      tipHint.textContent = '保持旋转，准备用心去发现。';
    } else {
      tipMain.textContent = '请向左拖动，寻找隐藏的祝福 ✨';
      tipHint.textContent = '右边是星空，左边有惊喜。';
    }
    tip.classList.remove('hidden');
  }
}

// 花瓣
function petal() {
  let w = document.querySelector('.petal-wrap');
  let p = document.createElement('div');
  p.className = 'petal';
  let s = Math.random() * 10 + 6;
  p.style.width = s + 'px';
  p.style.height = s * 1.1 + 'px';
  p.style.left = Math.random() * 100 + '%';
  p.style.opacity = 0.7 + Math.random() * 0.25;
  p.style.animationDuration = Math.random() * 4 + 6 + 's';
  p.style.animationDelay = Math.random() * -8 + 's';
  p.style.setProperty('--dx', (Math.random() * 120 - 60) + 'px');
  w.appendChild(p);
  setTimeout(() => p.remove(), 14000);
}
setInterval(petal, 500);

// 鼠标爱心
let h = [];
let hCanvas = document.getElementById('heartCanvas');
let hCtx = hCanvas.getContext('2d');
function resizeH() { hCanvas.width = innerWidth; hCanvas.height = innerHeight; }
resizeH(); window.onresize = resizeH;

window.onmousemove = e => {
  h.push({ x: e.x, y: e.y, s: 6, a: 1 });
};

function drawH() {
  hCtx.clearRect(0,0,hCanvas.width,hCanvas.height);
  h.forEach((o,i) => {
    hCtx.save();
    hCtx.globalAlpha = o.a;
    hCtx.fillStyle = '#ff8fb8';
    hCtx.beginPath();
    hCtx.moveTo(o.x,o.y);
    hCtx.bezierCurveTo(o.x-o.s,o.y-o.s*1.5, o.x-o.s*1.5,o.y+o.s/2, o.x,o.y+o.s);
    hCtx.bezierCurveTo(o.x+o.s*1.5,o.y+o.s/2, o.x+o.s,o.y-o.s*1.5, o.x,o.y);
    hCtx.fill();
    hCtx.restore();
    o.s += 0.15;
    o.a -= 0.015;
    if (o.a <= 0) h.splice(i,1);
  });
  requestAnimationFrame(drawH);
}
drawH();

// 渲染：视角靠近文字时 发光显现
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  let t = clock.getElapsedTime() * 0.5;
  gu.time.value = t * Math.PI;
  stars.rotation.y = t * 0.05;

  // 视角检测：转到后方 → 文字温柔发光显现
  let angle = controls.getAzimuthalAngle();
  updateTip(angle);

  if (!isFound) {
    marker.material.opacity = 0.45 + 0.15 * Math.sin(t * 2.5);
    marker.visible = true;
  }

  if (angle < -1.2 && !isFound) {
    isFound = true;
    marker.visible = false;

    tipMain.textContent = '祝福已显现，点击屏幕展开全文阅读';
    tipHint.textContent = '关闭后继续探索星空。';
    tip.classList.remove('hidden');

    // 平滑渐显 + 发光效果
    let fadeIn = () => {
      if (textPlane.material.opacity < 1) {
        textPlane.material.opacity += 0.012;
        requestAnimationFrame(fadeIn);
      }
    };
    fadeIn();
  }

  renderer.render(scene, camera);
}
animate();
</script>

</body>
</html>
