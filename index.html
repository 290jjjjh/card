<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>母亲节快乐 · 在星空中寻找爱</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}
body {
  overflow: hidden;
  background: #0a001a;
}

#threeCanvas {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
}

.petal-wrap {
  position: fixed;
  width: 100%;
  height: 100%;
  z-index: 2;
  pointer-events: none;
}
.petal {
  position: absolute;
  background: #ffb6c1;
  border-radius: 50%;
  opacity: 0.8;
  animation: fall linear infinite;
}
@keyframes fall {
  0% { opacity:0; }
  10% { opacity:0.8; }
  100% { transform: translateY(100vh) rotate(360deg); opacity:0; }
}

#heartCanvas {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  pointer-events: none;
  z-index: 5;
}
</style>
</head>

<body>

<canvas id="threeCanvas"></canvas>
<div class="petal-wrap"></div>
<canvas id="heartCanvas"></canvas>

<script type="module">
import * as THREE from "https://cdn.skypack.dev/three@0.136.0";
import { OrbitControls } from "https://cdn.skypack.dev/three@0.136.0/examples/jsm/controls/OrbitControls";

// 星空场景
let scene = new THREE.Scene();
scene.background = new THREE.Color(0x100020);

let camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 1, 1000);
camera.position.set(0, 4, 22);

const canvas = document.getElementById("threeCanvas");
let renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setSize(innerWidth, innerHeight);

window.addEventListener("resize", () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// 3D交互控制
let controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.enablePan = false;
controls.rotateSpeed = 0.4;
controls.minDistance = 12;
controls.maxDistance = 45;

// ==========================
// 核心改造：文字分散融入3D星空空间
// ==========================
const messageTexts = [
  "母亲节快乐",
  "妈妈，希望您永远不要被“母亲”这个标签所困",
  "你就应该开心地做自己",
  "尽情享受作为一个女性的爱与美",
  "想去看世界便去看世界",
  "想体验什么便大胆去体验",
  "不必被目标限制住自己的人生轨迹",
  "最后，希望您健康、平安、快乐！"
];

const textGroup = new THREE.Group();
scene.add(textGroup);

// 生成3D空间文字（随机分布在星空里）
function createSpaceText() {
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = 256;
  canvas.height = 64;

  messageTexts.forEach((text, lineIndex) => {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#ff99bb';
    ctx.font = 'bold 28px Arial';
    ctx.textAlign = 'center';
    ctx.fillText(text, 128, 40);

    const texture = new THREE.CanvasTexture(canvas);
    const material = new THREE.MeshBasicMaterial({
      map: texture,
      transparent: true,
      opacity: 0.9
    });

    const plane = new THREE.Mesh(
      new THREE.PlaneGeometry(8, 2),
      material
    );

    // 随机3D空间位置（散落在星空里）
    plane.position.set(
      (Math.random() - 0.5) * 60,
      (Math.random() - 0.5) * 30,
      (Math.random() - 0.5) * 60
    );

    // 随机角度，更自然融入空间
    plane.rotation.set(
      (Math.random() - 0.5) * Math.PI * 0.3,
      (Math.random() - 0.5) * Math.PI * 0.5,
      (Math.random() - 0.5) * Math.PI * 0.2
    );

    textGroup.add(plane);
  });
}
createSpaceText();

// ==========================
// 星空粒子
// ==========================
let gu = { time: { value: 0 } };
let sizes = [];
let shift = [];

function pushShift() {
  shift.push(
    Math.random() * Math.PI,
    Math.random() * Math.PI * 2,
    (Math.random() * 0.9 + 0.1) * Math.PI * 0.1,
    Math.random() * 0.9 + 0.1
  );
}

let pts = new Array(50000).fill().map(() => {
  sizes.push(Math.random() * 1.5 + 0.5);
  pushShift();
  return new THREE.Vector3().randomDirection().multiplyScalar(Math.random() * 0.5 + 9.5);
});

for (let i = 0; i < 100000; i++) {
  let r = 10, R = 40;
  let rand = Math.pow(Math.random(), 1.5);
  let radius = Math.sqrt(R * R * rand + (1 - rand) * r * r);
  pts.push(new THREE.Vector3().setFromCylindricalCoords(radius, Math.random() * 2 * Math.PI, (Math.random() - 0.5) * 2));
  sizes.push(Math.random() * 1.5 + 0.5);
  pushShift();
}

let g = new THREE.BufferGeometry().setFromPoints(pts);
g.setAttribute("sizes", new THREE.Float32BufferAttribute(sizes, 1));
g.setAttribute("shift", new THREE.Float32BufferAttribute(shift, 4));

let m = new THREE.PointsMaterial({
  size: 0.125,
  transparent: true,
  depthTest: false,
  blending: THREE.AdditiveBlending,
  onBeforeCompile: shader => {
    shader.uniforms.time = gu.time;
    shader.vertexShader = `
      uniform float time;
      attribute float sizes;
      attribute vec4 shift;
      varying vec3 vColor;
      ${shader.vertexShader}
    `.replace(
      `gl_PointSize = size;`,
      `gl_PointSize = size * sizes;`
    ).replace(
      `#include <color_vertex>`,
      `#include <color_vertex>
      float d = length(abs(position)/vec3(40.,10.,40));
      d=clamp(d,0.,1.);
      vColor = mix(vec3(227.,155.,0.),vec3(100.,50.,255.),d)/255.;`
    ).replace(
      `#include <begin_vertex>`,
      `#include <begin_vertex>
      float t = time;
      float moveT = mod(shift.x + shift.z * t,PI2);
      float moveS = mod(shift.y + shift.z * t,PI2);
      transformed += vec3(cos(moveS) * sin(moveT),cos(moveT),sin(moveS)*sin(moveT)) * shift.w;`
    );
    shader.fragmentShader = `
      varying vec3 vColor;
      ${shader.fragmentShader}
    `.replace(
      `#include <clipping_planes_fragment>`,
      `#include <clipping_planes_fragment>
      float d = length(gl_PointCoord.xy - 0.5);`
    ).replace(
      `vec4 diffuseColor = vec4( diffuse, opacity );`,
      `vec4 diffuseColor = vec4( vColor, smoothstep(0.5, 0.1, d) );`
    );
  }
});

let stars = new THREE.Points(g, m);
stars.rotation.order = "ZYX";
stars.rotation.z = 0.2;
scene.add(stars);

let clock = new THREE.Clock();

// 花瓣
function petal() {
  let w = document.querySelector('.petal-wrap');
  let p = document.createElement('div');
  p.className = 'petal';
  let s = Math.random() * 8 + 5;
  p.style.width = s + 'px';
  p.style.height = s + 'px';
  p.style.left = Math.random() * 100 + '%';
  p.style.animationDuration = Math.random() * 5 + 6 + 's';
  w.appendChild(p);
  setTimeout(() => p.remove(), 12000);
}
setInterval(petal, 500);

// 爱心
let h = [];
let hCanvas = document.getElementById('heartCanvas');
let hCtx = hCanvas.getContext('2d');
function resizeH() { hCanvas.width = innerWidth; hCanvas.height = innerHeight; }
resizeH(); window.onresize = resizeH;

window.onmousemove = e => {
  h.push({ x: e.x, y: e.y, s: 6, a: 1 });
};

function drawH() {
  hCtx.clearRect(0,0,hCanvas.width,hCanvas.height);
  h.forEach((o,i) => {
    hCtx.save();
    hCtx.globalAlpha = o.a;
    hCtx.fillStyle = '#ff8fb8';
    hCtx.beginPath();
    hCtx.moveTo(o.x,o.y);
    hCtx.bezierCurveTo(o.x-o.s,o.y-o.s*1.5, o.x-o.s*1.5,o.y+o.s/2, o.x,o.y+o.s);
    hCtx.bezierCurveTo(o.x+o.s*1.5,o.y+o.s/2, o.x+o.s,o.y-o.s*1.5, o.x,o.y);
    hCtx.fill();
    hCtx.restore();
    o.s += 0.15;
    o.a -= 0.015;
    if (o.a <= 0) h.splice(i,1);
  });
  requestAnimationFrame(drawH);
}
drawH();

// 渲染（只旋转星空，文字静止，营造探索感）
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  let t = clock.getElapsedTime() * 0.5;
  gu.time.value = t * Math.PI;
  stars.rotation.y = t * 0.05; // 只有星空缓慢旋转
  renderer.render(scene, camera);
}
animate();
</script>

</body>
</html>
